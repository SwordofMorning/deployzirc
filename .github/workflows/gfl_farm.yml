# deployzirc/.github/workflows/gfl_farm.yml

name: GFL Auto Farm Workflow

on:
  workflow_dispatch:
    inputs:
      mission_type:
        description: 'Select Mission Type to Farm'
        required: true
        default: 'f2p'
        type: choice
        options:
          - f2p
          - f2p_pr
          - f2p_epa
          - pick_coin
          - pick_and_train
          - epa_fifo
          - epa_rr
          - greyzone_halloween

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine Matrix Length
        id: set-matrix
        env:
          GFL_CONFIG_RAW: ${{ secrets.GFL_CONFIG }}
        run: |
          python -c '
          import os, json

          config_raw = os.environ.get("GFL_CONFIG_RAW", "").strip()
          length = 1

          if config_raw:
              try:
                  configs = json.loads(config_raw)
                  if isinstance(configs, list):
                      length = len(configs)
              except Exception as e:
                  print(f"[-] Warning: JSON parse failed. Secret format might be invalid.")
                  print(f"[-] Exception: {e}")
                  print(f"[*] Fallback to single account mode (length=1).")

          matrix_arr = list(range(length))
          matrix_json = json.dumps(matrix_arr, separators=(",", ":"))
          print(f"[*] Generated Index Matrix: {matrix_json}")
          
          output_path = os.environ.get("GITHUB_OUTPUT")
          with open(output_path, "a") as f:
              f.write(f"matrix={matrix_json}\n")
          '
          
      - name: Verify Output
        run: |
          echo "The final matrix string passed to the next job is: ${{ steps.set-matrix.outputs.matrix }}"

  farm:
    needs: prepare
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.prepare.outputs.matrix) }}
    
    steps:
      - name: Checkout ZIRC Source Code
        uses: actions/checkout@v4
        with:
          repository: 'MaaGF1/ZIRC'
          ref: 'master'
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./src/core

      - name: Run GFL Agent
        env:
          GFL_CONFIG: ${{ secrets.GFL_CONFIG }}
          GFL_SIGN_KEY: ${{ secrets.GFL_SIGN_KEY }}
          GFL_USER_DEVICE: ${{ secrets.GFL_USER_DEVICE }}
          GFL_MISSION_TYPE: ${{ github.event.inputs.mission_type }}
          GFL_ACCOUNT_INDEX: ${{ matrix.account_index }}
          PYTHONUNBUFFERED: "1"
        run: |
          python src/gha/agent.py

      - name: Check for Respawn Flag
        id: check_respawn
        shell: pwsh
        run: |
          if (Test-Path "respawn.flag") {
            echo "1" > "respawn_${{ matrix.account_index }}.flag"
            Write-Host "Respawn flag detected for account ${{ matrix.account_index }}."
          }

      - name: Upload Respawn Flag
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: respawn-flag-${{ matrix.account_index }}
          path: respawn_${{ matrix.account_index }}.flag
          if-no-files-found: ignore

  trigger_next:
    needs: farm
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all respawn flags
        uses: actions/download-artifact@v4
        with:
          pattern: respawn-flag-*
          merge-multiple: true

      - name: Trigger Next Workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if ls respawn_*.flag 1> /dev/null 2>&1; then
            echo "Respawn flag(s) found. Triggering next job..."
            
            # The -R ${{ github.repository }} strictly locks the target to the current deployzirc repo
            gh workflow run "GFL Auto Farm Workflow" -R ${{ github.repository }} -f mission_type="${{ github.event.inputs.mission_type }}"  
            echo "Next job triggered successfully."
          else
            echo "No respawn flags found. All jobs completed or failed fatally."
          fi